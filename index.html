<!DOCTYPE html>
<html lang="es">
<head> 
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta charset="UTF-8">
<title>Planilla Vóley - CReS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
/* 1. RESET Y FONDO GRIS */
body { 
  font-family: Arial; 
  background:#eaeaea; 
  margin: 0;
  padding: 0;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  width: 100%;
}

/* 2. CONTENEDOR DE LA APP */
#app {
  display: flex;
  flex-direction: column;
  align-items: center; 
  width: 100%;
  min-height: 100vh;
}

/* 3. LA HOJA BLANCA */
.sheet { 
  display: block;
  width: fit-content; 
  background: white; 
  padding: 15px; 
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  box-sizing: border-box;
  margin: 20px auto;
} 

h2 { text-align:center; color:red; }
table { border-collapse: collapse; width: 100%; margin: 0 auto; }
td, th { border:1px solid black; text-align:center; font-size:12px; height:28px; line-height:28px; padding:0 5px; width:70px; overflow:hidden; white-space:nowrap; }
#tablaSet th:first-child, #tablaSet td:first-child { width:33px; min-width:33px; max-width:33px; }
th { background:#f0f0f0; font-size:11px; }
select { width:100%; border:none; height:100%; font-size:12px; }
.cell { cursor:pointer; box-sizing: border-box; }
.seleccionado { background-color: #AEC6CF !important; }

/* 4. ESTÉTICA RESALTADA Y ALINEADA */
#columnaID {
  display: grid; 
  grid-template-rows: 30px repeat(12, 28px); 
  min-width: 80px; 
  flex-shrink: 0; 
  border: 2px solid black; 
  box-sizing: border-box;
}

.accion-block {
  display: grid; 
  grid-template-rows: 30px repeat(12, 28px); 
  width: 242px; /* Ajustado para compensar bordes internos */
  border: 2px solid black; 
  box-sizing: border-box; 
  flex-shrink: 0;
}

.porcentaje-celda {
  width: 40px; 
  height: 28px; 
  font-weight: bold; 
  background: #3536BD; 
  color: white; /* NUEVO: Texto blanco */
  text-align: center; 
  line-height: 28px; 
  font-size: 11px;
  border-left: 2px solid black; 
  border-right: 2px solid black; 
  box-sizing: border-box;
}

#gridEstadisticas {
  display: flex;
  gap: 5px;
  max-width: 95vw;
  margin: 0 auto;
  overflow-x: auto;
  background: white;
  padding: 10px;
  align-items: flex-start;
  -webkit-overflow-scrolling: touch;
}

button { touch-action: manipulation; }
</style>
</head>
<body>

<div id="portada" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; width: 100vw;">
  <img src="logo.png" alt="Escudo CReS" style="width:240px; margin-bottom:10px; display:block; background:transparent;">

  <button onclick="iniciarActividad('PARTIDO')" style="width:250px; padding:15px; font-size:16px; cursor:pointer; background:#d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">
    INICIAR PARTIDO
  </button>

  <button onclick="iniciarActividad('ENTRENAMIENTO')" style="width:250px; padding:15px; font-size:16px; cursor:pointer; background:#d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">
    INICIAR ENTRENAMIENTO
  </button>

  <button onclick="verHistorial()" style="width:250px; padding:15px; font-size:16px; cursor:pointer; background:#555; color:white; border:none; border-radius:8px; font-weight:bold;">
    HISTORIAL
  </button>

  <svg width="260" height="120" viewBox="0 0 260 120" style="margin-top:10px;">
    <defs><path id="curve" d="M20,90 A110,110 0 0,0 240,90" /></defs>
    <text font-size="16" fill="black" font-family="Arial" font-weight="600">
      <textPath href="#curve" startOffset="50%" text-anchor="middle">CLUB RESIDENTES SANTIAGUEÑOS</textPath>
    </text>
  </svg>
</div>

<div id="historial" style="display:none; padding:20px; width: 100%; box-sizing: border-box;">
  <h2>HISTORIAL</h2>
  <div id="listaHistorial"></div>
  <br>
  <button onclick="volverInicio()" style="padding:15px; width:100%; background:#555; color:white; border:none; border-radius:8px; font-weight:bold;">VOLVER</button>
</div>

<div id="comparacion" style="display:none; padding:20px; width: 100%; background: white; box-sizing: border-box;">
  <h2 style="color: blue;">COMPARATIVA DE RENDIMIENTO</h2>
  <div id="tablaComparativa" style="overflow-x: auto;"></div>
  <br>
  <button onclick="verHistorial()" style="width:100%; padding:15px; background:#555; color:white; border:none; border-radius:8px; font-weight:bold;">VOLVER AL HISTORIAL</button>
</div>

<div id="app" style="display:none;">
    <div class="sheet">
      <div style="margin-bottom:10px;">
        <strong>Fecha:</strong> <input type="date" id="inputFecha">
      </div>

      <div style="display: flex; gap: 10px; margin-bottom: 20px;">
          <button onclick="volverPortada()" style="flex: 1; padding: 10px; background: #555; color: white; border: none; border-radius: 8px; font-weight: bold;">VOLVER</button>
          <button onclick="guardarPartido()" style="flex: 1; padding: 10px; background: #555; color: white; border: none; border-radius: 8px; font-weight: bold;">GUARDAR</button>
      </div>

      <h2 id="tituloPrincipal">PLANILLA DE ESTADÍSTICA - CReS</h2>

      <div style="margin-bottom:10px;">
        <strong>Rival:</strong> <input type="text" id="inputRival" style="border:1px solid black;">
      </div>

      <table id="tablaSet">
        <thead>
          <tr><th rowspan="2">SET</th><th colspan="6">CReS</th><th colspan="6">RIVAL</th></tr>
          <tr><th>Saque</th><th>Err.R</th><th>Atq</th><th>Contr</th><th>Bloq</th><th>Puntos</th><th>Saque</th><th>Err.C</th><th>Atq</th><th>Contr</th><th>Bloq</th><th>Puntos</th></tr>
        </thead>
        <tbody id="setsBody"></tbody>
      </table>

      <h3 style="margin-top:20px; border-top:2px solid black; padding-top:10px; color:red; text-align: center;">ESTADÍSTICAS JUGADORAS</h3>

      <div id="controlesRapidos" style="display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-bottom: 20px; background: #f0f0f0; padding: 10px; border-radius: 8px; border: 1px solid #ccc; max-width: 600px; margin: 0 auto 20px auto;">
        <button onclick="cargarValorRapido('++')">++</button>
        <button onclick="cargarValorRapido('+')">+</button>
        <button onclick="cargarValorRapido('0')">0</button>
        <button onclick="cargarValorRapido('-')">-</button>
        <button onclick="cargarValorRapido('--')">--</button>
        <button onclick="cargarValorRapido('¡')">¡</button>
      </div>

      <div id="gridEstadisticas">
        <div id="columnaID"></div>
        <script>
          const MAX_ACCIONES = 8; 
          const accionesConfig = [
            {nombre:'RECEPCION'},
            {nombre:'SAQUE'},
            {nombre:'ATAQUE'},
            {nombre:'BLOQUEO'}
          ];
          accionesConfig.forEach(acc => {
  let tablaHtml = `<div class="accion-block">
    <div style="display: grid; grid-template-columns: repeat(${MAX_ACCIONES}, 25px) 40px; height: 30px; border-bottom: 2px solid black; box-sizing: border-box;">
      <div style="grid-column: span ${MAX_ACCIONES}; background: #eee; text-align: center; line-height: 30px; font-size: 10px; font-weight: bold; box-sizing: border-box;">${acc.nombre}</div>
      <div style="background: #3536BD; color: white; text-align: center; line-height: 30px; font-size: 11px; font-weight: bold; border-left: 2px solid black; border-right: 2px solid black; box-sizing: border-box;">%</div>
    </div>`;
    
  for(let i=1; i<=12; i++) {
    tablaHtml += `<div style="display: grid; grid-template-columns: repeat(${MAX_ACCIONES}, 25px) 40px; height: 28px; border-bottom: 1px solid #ccc; box-sizing: border-box;">`;
    for(let j=0; j<MAX_ACCIONES; j++) {
      tablaHtml += `<div class='cell' data-accion="${acc.nombre}" onclick='seleccionarCelda(this)' style="width: 25px; height: 27px; border-right: 1px solid #eee; text-align: center; line-height: 27px; font-size: 11px; box-sizing: border-box;"></div>`;
    }
    tablaHtml += `<div class="porcentaje-celda">0%</div>`;
    tablaHtml += `</div>`;
  }
  tablaHtml += `</div>`;
  document.write(tablaHtml);
});
        </script>
      </div>
    </div>
</div>

<script>
// LÓGICA DE TABLA DE SETS
const setsBody = document.getElementById('setsBody');
function crearSelect(){
  const select = document.createElement('select');
  select.innerHTML = '<option value="">-</option>';
  for(let i=1;i<=30;i++) select.innerHTML += `<option>${i}</option>`;
  return select;
}
for(let s=1;s<=5;s++){
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${s}</td>`;
  for(let i=0;i<10;i++){ 
    let td=document.createElement('td'); 
    td.appendChild(crearSelect()); 
    tr.appendChild(td);
    if(i===4 || i===9) {
      let tdP = document.createElement('td');
      tdP.innerHTML='<input type="number" style="width:100%; border:none; text-align:center; color:blue;">';
      tr.appendChild(tdP);
    }
  }
  setsBody.appendChild(tr);
}

let modoActual = "";
let celdaActiva = null;

function iniciarActividad(tipo) {
  modoActual = tipo;
  document.getElementById('tituloPrincipal').innerText = "PLANILLA DE " + tipo + " - CReS";
  document.getElementById('portada').style.display='none';
  document.getElementById('app').style.display='block';

  const colID = document.getElementById('columnaID');
  let contenido = '<div style="height: 30px; font-weight: bold; background: #f0f0f0; border-bottom: 2px solid black; text-align: center; line-height: 30px; font-size: 10px; box-sizing: border-box;">ID</div>';
  for(let i=1; i<=12; i++) {
    let styleRow = "height: 28px; border-bottom: 1px solid black; box-sizing: border-box; display: flex; align-items: center; justify-content: center;";
    if(tipo === 'ENTRENAMIENTO') {
      contenido += `<div style="${styleRow} background: #AEC6CF;"><input type="text" placeholder="Jugadora" style="width:100%; height:100%; border:none; background:transparent; text-align:center; font-size:10px;"></div>`;
    } else {
      contenido += `<div style="${styleRow} font-weight: bold; background: #AEC6CF; font-size: 12px;">${i}</div>`;
    }
  }
  colID.innerHTML = contenido;
}

function seleccionarCelda(cell) {
  document.querySelectorAll('.cell').forEach(c => c.style.backgroundColor = 'transparent');
  cell.style.backgroundColor = '#FFB375';
  celdaActiva = cell;
}

function cargarValorRapido(valor) {
  if(celdaActiva) {
    celdaActiva.innerText = valor;
    actualizarPorcentajeFila(celdaActiva.parentElement);
  }
}

function actualizarPorcentajeFila(filaDiv) {
  const celdasDatos = filaDiv.querySelectorAll('.cell');
  const celdaPorc = filaDiv.querySelector('.porcentaje-celda');
  const tipoAccion = celdasDatos[0].dataset.accion;
  let positivos = 0, total = 0;
  celdasDatos.forEach(div => {
    const val = div.innerText.trim();
    if (val !== '') {
      total++;
      if ((tipoAccion === 'RECEPCION' || tipoAccion === 'SAQUE') && (val === '+' || val === '++')) positivos++;
      else if (tipoAccion === 'ATAQUE' && val === '+') positivos++;
      else if (tipoAccion === 'BLOQUEO' && (val === '+' || val === '¡')) positivos++;
    }
  });
  celdaPorc.innerText = total > 0 ? Math.round((positivos / total) * 100) + '%' : '0%';
}

function guardarPartido(){
  const rival = document.getElementById('inputRival').value || 'Sin Nombre';
  const fecha = document.getElementById('inputFecha').value || new Date().toLocaleDateString();
  const partido = { tipo: modoActual, fecha, rival, html: document.getElementById('app').innerHTML };
  let historial = JSON.parse(localStorage.getItem('partidos') || '[]');
  historial.unshift(partido);
  localStorage.setItem('partidos', JSON.stringify(historial));
  alert('GUARDADO CORRECTAMENTE');
}

function verHistorial(){
  document.getElementById('portada').style.display='none';
  document.getElementById('app').style.display='none';
  document.getElementById('historial').style.display='block';
  const lista = document.getElementById('listaHistorial');
  lista.innerHTML='';
  const historial = JSON.parse(localStorage.getItem('partidos') || '[]');
  historial.forEach((p, i)=>{
    const div = document.createElement('div');
    div.style = "border:1px solid black; padding:10px; margin:5px 0; background:white; cursor:pointer;";
    div.innerHTML = `<strong>${p.tipo}:</strong> ${p.fecha} - ${p.rival}`;
    div.onclick = ()=> { document.getElementById('app').innerHTML = p.html; document.getElementById('historial').style.display='none'; document.getElementById('app').style.display='block'; };
    lista.appendChild(div);
  });
}

function volverInicio(){ document.getElementById('historial').style.display='none'; document.getElementById('portada').style.display='flex'; }
function volverPortada(){ document.getElementById('app').style.display='none'; document.getElementById('portada').style.display='flex'; }
</script>
</body>
</html>
