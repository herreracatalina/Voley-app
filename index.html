<!DOCTYPE html>
<html lang="es">
<head> 
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
<meta charset="UTF-8">
<title>Planilla Vóley - CReS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* AJUSTES PARA DESPLAZAMIENTO EN CELULARES */
body { 
  font-family: Arial; 
  background:#eaeaea; 
  margin: 0;
  padding: 0;
  display: block; /* Cambiado para permitir scroll natural */
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.sheet { 
  width: fit-content; /* Permite que el contenedor se estire según las tablas */
  min-width: 100vw; 
  background:white; 
  padding:15px; 
  box-shadow:0 0 10px rgba(0,0,0,0.3);
  box-sizing: border-box;
} 

h2 { text-align:center; color:red; }
table { border-collapse: collapse; width:100%;}
.sheet table tr { height:28px; }
.sheet table th { height:28px; }
td, th { border:1px solid black; text-align:center; font-size:12px; height:28px; line-height:28px; padding:0; width:70px; overflow:hidden; white-space:nowrap; }
#tablaSet th:first-child, #tablaSet td:first-child { width:33px; min-width:33px; max-width:33px; }
th { background:#f0f0f0; font-size:11px; }
select { width:100%; border:none; height:100%; font-size:12px; }
.cell { cursor:pointer; }
.seleccionado { background-color: #AEC6CF !important; }

/* Mejora para botones en pantallas táctiles */
button { cursor: pointer; touch-action: manipulation; }
</style>
</head>
<body>

<div id="portada" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
  <img src="logo.png" alt="Escudo CReS" style="width:240px; margin-bottom:10px; display:block; background:transparent;">

  <button onclick="iniciarActividad('PARTIDO')" style="width:250px; padding:15px; font-size:16px; background:#d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">
    INICIAR PARTIDO
  </button>

  <button onclick="iniciarActividad('ENTRENAMIENTO')" style="width:250px; padding:15px; font-size:16px; background:#d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">
    INICIAR ENTRENAMIENTO
  </button>

  <button onclick="verHistorial()" style="width:250px; padding:15px; font-size:16px; background:#555; color:white; border:none; border-radius:8px; font-weight:bold;">
    HISTORIAL
  </button>

  <svg width="260" height="120" viewBox="0 0 260 120" style="margin-top:10px;">
    <defs><path id="curve" d="M20,90 A110,110 0 0,0 240,90" /></defs>
    <text font-size="16" fill="black" font-family="Arial" font-weight="600">
      <textPath href="#curve" startOffset="50%" text-anchor="middle">CLUB RESIDENTES SANTIAGUEÑOS</textPath>
    </text>
  </svg>
</div>

<div id="historial" style="display:none; padding:20px; width: 100%; box-sizing: border-box;">
  <h2>HISTORIAL</h2>
  <p style="text-align:center; font-size:12px; color:#666;">Seleccioná 2 para comparar o hacé clic en uno para ver detalle.</p>
  <div id="listaHistorial"></div>
  <br>
  <button onclick="volverInicio()" style="padding:15px; width:100%; background:#555; color:white; border:none; border-radius:8px; font-weight:bold;">VOLVER</button>
</div>

<div id="comparacion" style="display:none; padding:20px; width: 100%; background: white; box-sizing: border-box;">
  <h2 style="color: blue;">COMPARATIVA DE RENDIMIENTO</h2>
  <div id="tablaComparativa" style="overflow-x: auto;"></div>
  <br>
  <button onclick="verHistorial()" style="width:100%; padding:15px; background:#555; color:white; border:none; border-radius:8px; font-weight:bold;">VOLVER AL HISTORIAL</button>
</div>

<div id="app" style="display:none;">
<div class="sheet">
<div style="margin-bottom:10px;">
  <strong>Fecha:</strong> <input type="date" id="inputFecha">
</div>

<div style="width: 100%; margin-top: 15px; margin-bottom: 20px;">
  <div style="display: flex; gap: 10px; width: 100%;">
